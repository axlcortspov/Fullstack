spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Product Service
        - id: product-service
          uri: http://product-service:8080
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=0

        # Auth Service
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        # User Service
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0

        # Order Service
        - id: order-service
          uri: http://order-service:8080
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0

        # Cart Service
        - id: cart-service
          uri: http://cart-service:8080
          predicates:
            - Path=/api/v1/cart/**
          filters:
            - StripPrefix=0

        # Payment Service
        - id: payment-service
          uri: http://payment-service:8080
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0

        # Inventory Service
        - id: inventory-service
          uri: http://inventory-service:8080
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=0

        # Notification Service
        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0

        # Shipping Service
        - id: shipping-service
          uri: http://shipping-service:8080
          predicates:
            - Path=/api/v1/shipping/**
          filters:
            - StripPrefix=0

        # Review Service
        - id: review-service
          uri: http://review-service:8080
          predicates:
            - Path=/api/v1/reviews/**
          filters:
            - StripPrefix=0

        - id: product-service-docs
          uri: http://product-service:8080
          predicates:
            - Path=/v3/api-docs/product-service
          filters:
            - RewritePath=/v3/api-docs/product-service, /v3/api-docs

        - id: auth-service-docs
          uri: http://auth-service:8080
          predicates:
            - Path=/v3/api-docs/auth-service
          filters:
            - RewritePath=/v3/api-docs/auth-service, /v3/api-docs

        - id: user-service-docs
          uri: http://user-service:8080
          predicates:
            - Path=/v3/api-docs/user-service
          filters:
            - RewritePath=/v3/api-docs/user-service, /v3/api-docs

        - id: order-service-docs
          uri: http://order-service:8080
          predicates:
            - Path=/v3/api-docs/order-service
          filters:
            - RewritePath=/v3/api-docs/order-service, /v3/api-docs

        - id: cart-service-docs
          uri: http://cart-service:8080
          predicates:
            - Path=/v3/api-docs/cart-service
          filters:
            - RewritePath=/v3/api-docs/cart-service, /v3/api-docs

        - id: payment-service-docs
          uri: http://payment-service:8080
          predicates:
            - Path=/v3/api-docs/payment-service
          filters:
            - RewritePath=/v3/api-docs/payment-service, /v3/api-docs

        - id: inventory-service-docs
          uri: http://inventory-service:8080
          predicates:
            - Path=/v3/api-docs/inventory-service
          filters:
            - RewritePath=/v3/api-docs/inventory-service, /v3/api-docs

        - id: notification-service-docs
          uri: http://notification-service:8080
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - RewritePath=/v3/api-docs/notification-service, /v3/api-docs

        - id: shipping-service-docs
          uri: http://shipping-service:8080
          predicates:
            - Path=/v3/api-docs/shipping-service
          filters:
            - RewritePath=/v3/api-docs/shipping-service, /v3/api-docs

        - id: review-service-docs
          uri: http://review-service:8080
          predicates:
            - Path=/v3/api-docs/review-service
          filters:
            - RewritePath=/v3/api-docs/review-service, /v3/api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: product-service
        url: /v3/api-docs/product-service
      - name: auth-service
        url: /v3/api-docs/auth-service
      - name: user-service
        url: /v3/api-docs/user-service
      - name: order-service
        url: /v3/api-docs/order-service
      - name: cart-service
        url: /v3/api-docs/cart-service
      - name: payment-service
        url: /v3/api-docs/payment-service
      - name: inventory-service
        url: /v3/api-docs/inventory-service
      - name: notification-service
        url: /v3/api-docs/notification-service
      - name: shipping-service
        url: /v3/api-docs/shipping-service
      - name: review-service
        url: /v3/api-docs/review-service
  api-docs:
    enabled: true

server:
  port: 8000
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    prefer-ip-address: true
    org.springframework.boot.web: INFO