spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Product Service
        - id: product-service
          uri: http://product-service:8080
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=0

        # Auth Service
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        # User Service
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0

        # Order Service
        - id: order-service
          uri: http://order-service:8080
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0

        # Cart Service
        - id: cart-service
          uri: http://cart-service:8080
          predicates:
            - Path=/api/v1/carts/**
          filters:
            - StripPrefix=0

        # Payment Service
        - id: payment-service
          uri: http://payment-service:8080
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0

        # Inventory Service
        - id: inventory-service
          uri: http://inventory-service:8080
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=0

        # Notification Service
        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0

        # Shipping Service
        - id: shipping-service
          uri: http://shipping-service:8080
          predicates:
            - Path=/api/v1/shipping/**
          filters:
            - StripPrefix=0

        # Review Service
        - id: review-service
          uri: http://review-service:8080
          predicates:
            - Path=/api/v1/reviews/**
          filters:
            - StripPrefix=0

server:
  port: 8000
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.boot.web: INFO
