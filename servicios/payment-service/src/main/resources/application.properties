spring.application.name=payment-service
server.port=8080

spring.datasource.url=jdbc:mysql://mysql:3306/payment_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

services.order.url=http://order-service:8080

spring.cloud.openfeign.client.config.default.connect-timeout=3000
spring.cloud.openfeign.client.config.default.read-timeout=3000

logging.level.cl.duoc.payment_service=INFO
logging.level.feign=DEBUG

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true