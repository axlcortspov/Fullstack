spring.application.name=cart-service
server.port=8080


spring.datasource.url=jdbc:mysql://cart-db:3306/cart_db
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

feign.user-service.url=http://user-service:8080
feign.product-service.url=http://product-service:8080

spring.cloud.openfeign.client.config.default.connect-timeout=3000
spring.cloud.openfeign.client.config.default.read-timeout=3000

logging.level.cl.duoc.cart_service=INFO
logging.level.feign=DEBUG

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true