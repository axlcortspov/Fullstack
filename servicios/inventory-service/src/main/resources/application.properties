spring.application.name=inventory-service
server.port=8080

spring.datasource.url=jdbc:mysql://mysql:3306/inventory_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

services.product.url=http://product-service:8080

spring.cloud.openfeign.client.config.default.connect-timeout=3000
spring.cloud.openfeign.client.config.default.read-timeout=3000

logging.level.cl.duoc.inventory_service=INFO
logging.level.feign=DEBUG