  # microservicios

  auth-service:
    build: ./servicios/auth-service
    container_name: auth_service
    ports:
      - "8081:8080"
    depends_on:
      mysql-auth:
        condition: service_healthy
    networks:
      - red_microservicios
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/auth_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  user-service:
    build: ./servicios/user-service
    container_name: user_service
    ports:
      - "8082:8080"
    depends_on:
      mysql-user:
        condition: service_healthy
    networks:
